name: CI-CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install lint dependencies
        run: python -m pip install --upgrade pip ruff

      - name: Run Ruff
        run: ruff check .

  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

  coverage:
    name: Coverage Gate
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install coverage dependencies
        run: python -m pip install --upgrade pip coverage

      - name: Run coverage
        run: coverage run -m unittest discover -s tests -p "test_*.py" -v

      - name: Enforce coverage threshold
        run: coverage report

      - name: Export coverage XML
        run: coverage xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  delivery:
    name: Delivery Artifact
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [coverage]
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Create release artifact
        run: |
          tar -czf release-bundle.tar.gz README.md main.py tests pyproject.toml

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: release-bundle.tar.gz
